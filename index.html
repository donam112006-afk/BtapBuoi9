<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập buổi 9</title>
    <script>

        function removeVietNamese(str) {
            return str.normalize('NFD')
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/đ/g, "d")
                .replace(/Đ/g, "D");
        }
        let fullName = "Đỗ Phương Nam";
        let studentID = "27A4042964";
        let coursePeriod = "K" + studentID.slice(0, 2);
        let faculty = "Công nghệ thông tin & Kinh tế số";
        let sum = Number(studentID[studentID.length - 1])
            + Number(studentID[studentID.length - 2])
            + Number(studentID[studentID.length - 3])
            + Number(studentID[studentID.length - 4]);

        let parts = removeVietNamese(fullName).toLowerCase().split(" ");

        let firstName = parts[parts.length - 1];
        let lastName = parts[0][0];
        let middleName = parts[1][0];
        let email = firstName + lastName + middleName + "." + studentID.toLowerCase() + "@hvnh.edu.vn";

        document.writeln("Email: " + email + "<br>");
        document.writeln("Xin chào " + fullName
            + ", bạn là sinh viên khóa " + coursePeriod
            + ", khoa " + faculty
            + ", tổng 4 số cuối là " + sum);
    </script>
</head>

</html>
